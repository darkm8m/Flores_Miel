<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojos Color Miel - Flor Animada</title>
    <style>
        *,
        *::after,
        *::before{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        :root{
            --color-bg: linear-gradient(to top,#010329,#000005);
            --color-glass:linear-gradient(to left,#142544,#1a9092);
            --color-water:linear-gradient(to left,#142544,#1b6d6e);
        }

        body{
            background-image:var(--color-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items:flex-end;
            overflow: hidden;
            font-family: 'Arial', 'Segoe UI', sans-serif;
        }

        /* === ESTILO DE LETRAS - SIN MARCO === */
        .lyrics-container {
            position: fixed;
            bottom: 30%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            padding: 20px;
        }

        /* Línea actual */
        .current-line {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.8), 0 0 5px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            padding: 10px 20px;
            background: transparent;
            letter-spacing: 1px;
            animation: glow 2s ease-in-out infinite;
        }

        /* Historial de letras */
        .all-lyrics {
            max-height: 200px;
            overflow-y: auto;
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,105,180,0.5) transparent;
        }

        .all-lyrics::-webkit-scrollbar {
            width: 4px;
        }
        .all-lyrics::-webkit-scrollbar-track {
            background: transparent;
        }
        .all-lyrics::-webkit-scrollbar-thumb {
            background: rgba(255,105,180,0.5);
            border-radius: 10px;
        }

        .lyric-line {
            font-size: 1rem;
            margin: 8px 0;
            padding: 4px 8px;
            opacity: 0.55;
            transition: all 0.3s ease;
            color: #fff;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            background: transparent;
        }

        .lyric-line.active {
            opacity: 1;
            font-size: 1.1rem;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            transform: scale(1.02);
        }

        .lyric-line.played {
            opacity: 0.7;
            color: #ffb6c1;
        }

        .song-title {
            margin-bottom: 15px;
            opacity: 0.8;
        }
        .song-title h2 {
            color: #ffd700;
            font-size: 1.3rem;
            text-shadow: 0 0 8px rgba(255,105,180,0.6);
            letter-spacing: 2px;
        }
        .song-title p {
            color: #ffb6c1;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #ffd700, 0 0 10px #ff69b4; }
            100% { text-shadow: 0 0 20px #ffd700, 0 0 30px #ff1493; }
        }

        /* Controles de música */
        .music-controls {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            pointer-events: auto;
            border: 1px solid rgba(255,192,203,0.3);
        }
        #music {
            width: 200px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }

        /* === FLORES (tú código original) === */
        .flower{
            position: relative;
            z-index: 1;
        }

        .flower__glass{
            width:20vmin;
            height: 30vmin;
            background-image: var(--color-glass);
            clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%);
            opacity: .8;
            position: relative;
        }

        .flower__glass::after{
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            background-color: #182843;
            width: 100%;
            height: 2vmin;
        }

        .flower__glass::before{
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            background-image: var(--color-water);
            width: 100%;
            height: 15vmin;
        }

        .flower-pp{
            position: absolute;
            left: 45%;
            bottom: 2vmin;
        }

        .flower-pp--2{
            left: 50%;
            bottom: 5%;
            transform-origin: 10% left;
            transform: rotate(20deg);
        }

        .flower-pp--3{
            left: 30%;
            bottom: 5%;
            transform-origin: 10% left;
            transform: rotate(-10deg);
        }

        .flower-pp--3 .flower_l{
            height: 45vmin;
            position: relative;
        }

        .flower-pp--3 .flower_l::after{
            content: '';
            position: absolute;
            left:0;
            top: 0;
            width: 6vmin;
            height: 6vmin;
            transform: translate(-69%,-30%) rotate(-5deg);
            border-radius:10vmin 10vmin 0 0;
            border: 2vmin solid  #104d4e;
            border-bottom: transparent;
            border-left: transparent;
        }

        .flower-pp--3 .flower_l::before{
            content: '';
            position: absolute;
            left:-40%;
            top: -1%;
            width: 6vmin;
            height: 2vmin;
            transform-origin: right;
            transform: translate(-100%,-80%) rotate(-20deg);
            background-color: #104d4e;
            border-radius: 2vmin;
        }

        .flower-pp--3 .flower_l{
            background-image: linear-gradient(to top,#142544,#104d4e);
        }


        .flower-pp--2 .flower_l{
            height: 45vmin;
        }

        .flower-pp--2 .f{
            transform: translateX(-50%) rotate(20deg);
        }

        .flower-pp--3 .f{
            transform: translate(-350%,-50%) rotate(-120deg);
        }

        .flower-pp--2 .leaf:not(:first-child){
            width: 3.8vmin;
            height: 10vmin;
            background-image: linear-gradient(to bottom, #ff43b6 ,#c22887, #1a233a 99%);
        }

        .flower-pp--3 .leaf:not(:first-child){
            width: 3.8vmin;
            height: 10vmin;
            background-image: linear-gradient(to bottom, #ad2be0 ,#712291, #1a233a 99%);
        }

        .flower-pp--3 .leaf--1{
            width: 8vmin;
            height: 10vmin;
            bottom: 2vmin;
            background-color: #ad2be0;
        }

        .flower-pp--2 .leaf--1{
            width: 8vmin;
            height: 10vmin;
            bottom: 2vmin;
            background-color: #de118b;
        }

        .flower-pp--2 .f .leaf--8{
            width: 10vmin;
            height: 9vmin;
            bottom: 3vmin;
            left: -30%;
            transform: rotate(-50deg);
            background-image: linear-gradient(to left bottom, #ff43b6 ,#4d1337);;
        }

        .flower-pp--3 .f .leaf--8{
            width: 10vmin;
            height: 9vmin;
            left: -10% !important;
            background-image: linear-gradient(to left bottom, #ad2be0 ,#712291);;
        }

        .flower_l{
            width: 2vmin;
            height: 56vmin;
            background-image: linear-gradient(to left top,#82fdff 20%,#142544,#104d4e);
            border-radius: 4vmin;
        }

        .f{
            position: absolute;
            top: 1vmin;
            left: 50%;
            transform: translateX(-50%) rotate(-10deg);
            width: 2vmin;
            height: 2vmin;
        }


        .leaf{
            position: absolute;
            left: 50%;
            bottom: 2vmin;
            transform: translateX(-50%);
            width: 5vmin;
            height: 14vmin;
            background-image: linear-gradient(to bottom, #ffa085 ,#fa7373, #1a233a 99%);

            clip-path: ellipse(50% 50% at 50% 50%);
            transform-origin: center bottom;
            animation: open-flower 2s 1s backwards;
        }

        .leaf--1{
            width: 10vmin;
            height: 12vmin;
            bottom: 3vmin;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            background-color: #e24f5f;
            background-image: none;
            animation: open-flowe--middle  1.4s 1s backwards;
        }

        .leaf--2{
            transform: translateX(-50%) rotate(-30deg);
        }
        .leaf--3{
            transform: translateX(-50%) rotate(-50deg);
        }
        .leaf--4{
            transform: translateX(-50%) rotate(-70deg);
        }

        .leaf--5{
            transform: translateX(-50%) rotate(30deg);
        }

        .leaf--6{
            transform: translateX(-50%) rotate(50deg);
        }

        .leaf--7{
            transform: translateX(-50%) rotate(70deg);
        }

        .leaf--8{
            width: 13vmin;
            height: 11vmin;
            bottom: 6vmin;
            left: -30%;
            border-radius: none;
            clip-path: none;
            border-radius: 10vmin 2vmin 10vmin 2vmin;
            transform: rotate(-55deg);
            background-image: linear-gradient(to left bottom, #ffa085 ,#eb8b8b,#492f2f 98%);
        }

        .flower__fall-down--yellow{
            animation: flower-fall-down-yellow  8s 1.2s linear forwards;
        }

        .flower__fall-down--pink{
            animation: flower-fall-down-pink  5s 1.2s linear forwards;
        }

        .flower__fall-down--purple{
            bottom: 4vmin;
            animation:flower-fall-down-purple  6s 1.2s linear forwards, flower-falling 6s 7.2s linear infinite;
        }

        @keyframes open-flower{
            0%{
                transform:  translateX(-50%) rotate(0);
            }
        }

        @keyframes open-flowe--middle {
            0%{
                opacity: 0;
                transform: translateX(-50%) scale(0);
            }
        }

        @keyframes flower-fall-down-pink {

            0%{
                transform: rotate(-55deg);
            }

            50%{
                transform: rotateX(-100deg);
            }

            100%{
                transform:translate(2vmin,28vmin);
            }

        }

        @keyframes flower-fall-down-yellow {

            0%{
                transform: rotate(-55deg);
            }

            50%{
                bottom: 3vmin;
                transform: rotateX(-100deg);
            }

            100%{
                transform:translate(2vmin,70vmin) rotate(150deg);
            }

        }

        @keyframes flower-fall-down-purple {

            0%{
                transform: rotate(-50deg);
            }

            25%{
                bottom: 1vmin ;
                transform: rotateX(-100deg);
                perspective: 0px;
            }

            50%{
                perspective: 0px;
                transform:translate(-30vmin,2vmin) rotate(90deg);
            }

            75%{
                perspective: 0px;
                transform:translate(-34vmin,-2vmin);
            }

            100%{
                transform-origin: center;
                transform:translate(-34vmin,-2vmin) rotateY(-80deg) rotateX(35deg);
            }

        }

        @keyframes flower-falling {
            0%,100%{
                transform-origin: center;
                transform:translate(-34vmin,-2vmin) rotateY(-80deg) rotateX(35deg);
            }

            25%{
                transform-origin: center;
                transform:translate(-34.4vmin,-2vmin) rotateY(-84deg) rotateX(35deg);
            }

            50%{
                transform-origin: center;
                transform:translate(-32vmin,-4.2vmin) rotateY(-80deg) rotateX(35deg);
            }

            75%{
                transform-origin: center;
                transform:translate(-36vmin,1.1vmin) rotateY(-80deg) rotateX(35deg);
            }
        }

        @media (max-width: 768px) {
            .current-line {
                font-size: 1.2rem;
            }
            .lyric-line {
                font-size: 0.85rem;
            }
            .all-lyrics {
                max-height: 150px;
            }
            .song-title h2 {
                font-size: 1rem;
            }
            #music {
                width: 160px;
            }
        }
    </style>
</head>
<body>

    <!-- FLORES -->
    <div class="flower">
        <div class="flower-pp">
            <div class="flower_l"></div>
            <div class="f">
                <div class="leaf leaf--1"></div>
                <div class="leaf leaf--2"></div>
                <div class="leaf leaf--3"></div>
                <div class="leaf leaf--4"></div>
                <div class="leaf leaf--5"></div>
                <div class="leaf leaf--6"></div>
                <div class="leaf leaf--7"></div>
                <div class="leaf leaf--8 flower__fall-down--yellow"></div>
            </div>
        </div>

        <div class="flower-pp flower-pp--2">
            <div class="flower_l"></div>
            <div class="f">
                <div class="leaf leaf--1"></div>
                <div class="leaf leaf--2"></div>
                <div class="leaf leaf--3"></div>
                <div class="leaf leaf--4"></div>
                <div class="leaf leaf--5"></div>
                <div class="leaf leaf--6"></div>
                <div class="leaf leaf--7"></div>
                <div class="leaf leaf--8 flower__fall-down--pink"></div>
            </div>
        </div>

        <div class="flower-pp flower-pp--3">
            <div class="flower_l"></div>
            <div class="f">
                <div class="leaf leaf--1"></div>
                <div class="leaf leaf--2"></div>
                <div class="leaf leaf--3"></div>
                <div class="leaf leaf--4"></div>
                <div class="leaf leaf--5"></div>
                <div class="leaf leaf--6"></div>
                <div class="leaf leaf--7"></div>
                <div class="leaf leaf--8 flower__fall-down--purple"></div>
            </div>
        </div>
        <div class="flower__glass"></div>
    </div>

    <!-- LETRAS -->
    <div class="lyrics-container">
        <div class="song-title">
            <h2>🍯 OJOS COLOR MIEL 🍯</h2>
            <p>♪ haz clic en play ♪</p>
        </div>
        <div class="current-line" id="currentLine">
            ✨ Esperando la música... ✨
        </div>
        <div class="all-lyrics" id="allLyrics"></div>
    </div>

    <!-- CONTROLES -->
    <div class="music-controls">
        <audio id="music" controls>
            <source src="miel.mp3" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <script>
        // ============================================
        // LETRA COMPLETA - "OJOS COLOR MIEL"
        // ============================================
        const lyrics = [
            { time: 7, text: "🎵 Tú eres el pincel 🖌️✨" },
            { time: 10, text: "Que pinta mi papel 📝" },
            { time: 13, text: "Tú llenas de color mi vida 🌈" },
            { time: 16, text: "Contigo me siento bien 😊" },
            { time: 17, text: "Eres como te soñé 🌙" },
            { time: 19, text: "Así que ven y quédate en mi vida 💕" },
            { time: 22, text: "Tus palabras me hacen ver 👀" },
            { time: 27, text: "Que no eres de papel 📄" },
            { time: 29, text: "Mi otra mitad, ya te encontré 💑" },
            { time: 32, text: "🍯 Ojos color miel 🍯✨" },
            { time: 34, text: "Y tu suave dulce piel 🌸" },
            { time: 36, text: "Que me hace enloquecer 💓" },
            { time: 39, text: "🎵 Tú 🎵💖" },
            { time: 42, text: "Eres con quien quiero estar" },
            { time: 46, text: "Tú ✨" },
            { time: 51, text: "A quien quiero yo besar " },
            { time: 54, text: "Y esa sonrisa me mata 💕" },
            { time: 55, text: "Esa sonrisa me atrapa" },
            { time: 57, text: "Esa sonrisa es con quien yo quiero estar" },
            { time: 61, text: "Y esas caricias me atrapan ✨" },
            { time: 63, text: "Esa mirada me encanta 💕" },
            { time: 65, text: "Esa boquita la quiero yo besar " },
            { time: 84, text: "🎵 Tú 🎵💖" },
            { time: 88, text: "Eres con quien quiero estar" },
            { time: 92, text: "🎵 Tú 🎵✨" },
            { time: 95, text: "A quien quiero yo besar " },
            { time: 98, text: "Esa sonrisa me mata 💕" },
            { time: 100, text: "Esa sonrisa me atrapa" },
            { time: 103, text: "Esa sonrisa es con quien yo quiero estar" },
            { time: 106, text: "Y esas caricias me atrapan" },
            { time: 109, text: "Esa mirada me encanta" },
            { time: 110, text: "Esa boquita la quiero yo besar 💕" },
            { time: 115, text: "Uh... 🌙" },
            { time: 117, text: "Quiero yo besar ✨" },
            { time: 120, text: "✨🌸 Fin 🌸✨" }
        ];

        const music = document.getElementById("music");
        const currentLineDiv = document.getElementById("currentLine");
        const allLyricsDiv = document.getElementById("allLyrics");
        
        let displayedLines = [];
        
        function updateLyrics() {
            const currentTime = music.currentTime;
            
            let activeText = "";
            let activeIndex = -1;
            
            for(let i = lyrics.length - 1; i >= 0; i--) {
                if(currentTime >= lyrics[i].time) {
                    activeText = lyrics[i].text;
                    activeIndex = i;
                    break;
                }
            }
            
            if(activeText) {
                currentLineDiv.innerHTML = `${activeText}`;
            } else {
                currentLineDiv.innerHTML = "🎶 ... 🎶";
            }
            
            // Acumular líneas ya mostradas
            lyrics.forEach((line, index) => {
                if(currentTime >= line.time && !displayedLines.includes(index)) {
                    displayedLines.push(index);
                }
            });
            
            displayedLines.sort((a, b) => a - b);
            
            let html = '';
            displayedLines.forEach(index => {
                const line = lyrics[index];
                const isActive = (index === activeIndex);
                html += `<div class="lyric-line ${isActive ? 'active' : 'played'}">${line.text}</div>`;
            });
            
            allLyricsDiv.innerHTML = html;
            
            if(activeIndex !== -1) {
                setTimeout(() => {
                    const activeElement = document.querySelector('.lyric-line.active');
                    if(activeElement) {
                        activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            }
        }
        
        music.addEventListener("timeupdate", updateLyrics);
        music.addEventListener("seeked", updateLyrics);
        music.addEventListener("ended", () => {
            currentLineDiv.innerHTML = "🏁 ¡Gracias por escuchar! 🏁";
        });
        music.addEventListener("pause", () => {
            currentLineDiv.innerHTML = "⏸️ Pausado";
        });
        
        updateLyrics();

        // Ayuda para autoplay
        document.body.addEventListener('click', function initAudio() {
            if(music.paused && music.readyState >= 2) {
                music.play().catch(e => console.log("Inicia manualmente"));
            }
        });
    </script>
</body>
</html>
